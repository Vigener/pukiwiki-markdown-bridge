<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PukiWiki Markdown Bridge</title>
  <script type="module" crossorigin src="/assets/popup-C5ZtF9V1.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="/assets/popup-C5g0J3Jd.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>PukiWiki Markdown Bridge</h1>
      <div class="header-actions">
        <button id="copy-btn" class="icon-btn" title="Markdownをコピー">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        </button>
        <button id="apply-btn" class="primary-btn">Pukiwikiに変換して反映</button>
      </div>
    </div>
    <div id="draft-banner" class="draft-banner" style="display: none;">
      <span>未保存のドラフトがあります</span>
      <div class="draft-actions">
        <button id="draft-restore-btn" class="draft-btn restore">復元する</button>
        <button id="draft-discard-btn" class="draft-btn discard">破棄する</button>
      </div>
    </div>
    <div class="editor-container">
      <textarea id="markdown-editor"></textarea>
    </div>
  </div>
</body>
</html>
