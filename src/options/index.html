<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Options - PukiWiki Markdown Bridge</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    textarea {
      width: 100%;
      height: 150px;
      font-family: monospace;
    }
    .hint {
      font-size: 12px;
      color: #666;
    }
    button {
      padding: 8px 16px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #2980b9;
    }
    #status {
      margin-top: 10px;
      color: green;
      display: none;
    }
  </style>
</head>
<body>
  <h1>設定 (Options)</h1>
  
  <div class="form-group">
    <label for="allowedUrls">拡張機能を有効にするURL (1行に1つ、ワイルドカード*使用可):</label>
    <textarea id="allowedUrls"></textarea>
    <div class="hint">例: https://www.hpcs.cs.tsukuba.ac.jp/internal/pukiwiki/*</div>
  </div>

  <button id="saveBtn">保存</button>
  <div id="status">保存しました。</div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
