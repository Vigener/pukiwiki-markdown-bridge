<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Options - PukiWiki Markdown Bridge</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    textarea {
      width: 100%;
      height: 150px;
      font-family: monospace;
    }
    .hint {
      font-size: 12px;
      color: #666;
    }
    button {
      padding: 8px 16px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #2980b9;
    }
    #status {
      margin-top: 10px;
      color: green;
      display: none;
    }
  </style>
</head>
<body>
  <h1>設定 (Options)</h1>
  
  <div class="form-group">
    <label for="allowedUrls">拡張機能を有効にするURL (1行に1つ、ワイルドカード*使用可):</label>
    <textarea id="allowedUrls"></textarea>
    <div class="hint">
      例: https://example.com/pukiwiki/?Your_Team/Your_Name*<br>
      ※ <code>?ディレクトリ名</code> の形式で指定すると、自動的に編集画面 (<code>?cmd=edit&page=...</code>) にもマッチするよう安全に変換されます。
    </div>
  </div>

  <div class="form-group checkbox-group">
    <label>
      <input type="checkbox" id="shortcutApply" checked>
      <code>Cmd+Enter</code> または <code>Ctrl+Enter</code> でPukiwikiに自動反映する
    </label>
  </div>

  <div class="form-group checkbox-group">
    <label>
      <input type="checkbox" id="markdownRoundtripCheck" checked>
      PukiWiki仕様への自動調整（簡略化）が発生する場合に差分を確認する
    </label>
    <div class="hint">
      例: Markdown側で深さ4以上の箇条書きを書いた場合など、PukiWikiの制限に合わせて自動的に表示が調整される箇所がある場合に事前確認画面を表示します。
    </div>
  </div>

  <div class="form-group">
    <label for="diffConfirmMode">反映前の差分(Diff)確認:</label><br>
    <select id="diffConfirmMode" style="margin-top: 8px; padding: 4px;">
      <option value="deletions_only">削除がある場合のみ確認する (推奨)</option>
      <option value="always">常に確認する</option>
      <option value="none">確認しない (即時反映)</option>
    </select>
  </div>

  <button id="saveBtn">保存</button>
  <div id="status">保存しました。</div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
