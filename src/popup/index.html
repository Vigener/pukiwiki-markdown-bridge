<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PukiWiki Markdown Bridge</title>
  <link rel="stylesheet" href="../../node_modules/easymde/dist/easymde.min.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>PukiWiki Markdown Bridge</h1>
      <div class="header-actions">
        <button id="copy-btn" class="icon-btn" title="Markdownをコピー">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        </button>
        <button id="apply-btn" class="primary-btn">Pukiwikiに変換して反映</button>
        <button id="edit-page-btn" class="primary-btn" style="display: none; background-color: #27ae60;">編集画面へ移動</button>
      </div>
    </div>
    <div id="draft-banner" class="draft-banner" style="display: none;">
      <span>未保存のドラフトがあります</span>
      <div class="draft-actions">
        <button id="draft-diff-btn" class="draft-btn diff">差分を確認</button>
        <button id="draft-restore-btn" class="draft-btn restore">復元する</button>
        <button id="draft-discard-btn" class="draft-btn discard">破棄する</button>
      </div>
    </div>
    <div class="editor-container">
      <textarea id="markdown-editor"></textarea>
    </div>
  </div>

  <!-- Diff Modal -->
  <div id="diff-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="diff-modal-title">差分(Diff)の確認</h2>
      </div>
      <div class="modal-body">
        <div id="diff-content" class="diff-view"></div>
      </div>
      <div class="modal-footer">
        <button id="diff-cancel-btn" class="modal-btn cancel">キャンセル</button>
        <button id="diff-action-btn" class="modal-btn action">続行する</button>
      </div>
    </div>
  </div>

  <!-- Validation Modal -->
  <div id="validation-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content validation-content">
      <div class="modal-header validation-header">
        <h2 id="validation-modal-title">⚠️ PukiWikiで非互換の記法があります</h2>
      </div>
      <div class="modal-body">
        <p>以下の内容はPukiWikiの制限により正しく反映されないか、自動的に変換されます。</p>
        <ul id="validation-content" class="validation-list"></ul>
      </div>
      <div class="modal-footer">
        <button id="validation-cancel-btn" class="modal-btn cancel">編集に戻る</button>
        <button id="validation-action-btn" class="modal-btn action warning">自動変換して反映</button>
      </div>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
